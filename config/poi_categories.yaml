keyword_taxonomy_rules:
  # Legacy matcher rules for coarse Google Maps export normalization.
  # These are not the canonical taxonomy; the real curated taxonomy lives under
  # `curated_taxonomy`.
  # --- Food & Drink (specific first to avoid false matches) ---
  pizza:
    category: restaurants
    subcategory: pizza
    keywords:
      - pizza
  bakeries:
    category: bakeries
    subcategory: bakeries
    keywords:
      - bakery
      - pastry
      - patisserie
  sandwiches:
    category: restaurants
    subcategory: sandwiches
    keywords:
      - sandwich
  coffee_shops:
    category: coffee_shops
    subcategory: coffee_shops
    keywords:
      - coffee
      - cafe
      - espresso
  chinese_cuisine:
    category: restaurants
    subcategory: chinese
    keywords:
      - chinese
      - dim sum
      - cantonese
  japanese_cuisine:
    category: restaurants
    subcategory: japanese
    keywords:
      - japanese
      - sushi
      - ramen
      - izakaya
  specialty_grocery:
    category: specialty_grocery
    subcategory: specialty_grocery
    keywords:
      - speciality
      - specialty
      - gourmet
  # food_markets must come before groceries — both can match "market"
  food_markets:
    category: food_markets
    subcategory: food_markets
    keywords:
      - market
      - food hall
  restaurants:
    category: restaurants
    subcategory: restaurants
    keywords:
      - restaurant
      - diner
      - food
  bars:
    category: bars
    subcategory: bars
    keywords:
      - bar
      - brewery
      - pub
      - cocktail
  # --- Culture & Entertainment ---
  bookstores:
    category: bookstores
    subcategory: bookstores
    keywords:
      - bookstore
      - books
  record_stores:
    category: record_stores
    subcategory: record_stores
    keywords:
      - record
      - vinyl
  museums:
    category: museums
    subcategory: museums
    keywords:
      - museum
      - gallery
  movie_theaters:
    category: movie_theaters
    subcategory: movie_theaters
    keywords:
      - cinema
      - movie
      - theater
  music_venues:
    category: music_venues
    subcategory: music_venues
    keywords:
      - venue
      - concert
      - music
      - jazz
  # --- Everyday & Outdoor ---
  groceries:
    category: groceries
    subcategory: groceries
    keywords:
      - grocery
      - supermarket
  shopping:
    category: shopping
    subcategory: shopping
    keywords:
      - shop
      - store
      - mall
  parks:
    category: parks
    subcategory: parks
    keywords:
      - park
      - garden
      - playground

